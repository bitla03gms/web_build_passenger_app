<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>passenger_app</title>
  <!--
    SPA fallback for GitHub Pages.

    GitHub Pages is a static host: any deep link (e.g. /orderConfirmationPage?
    order_pnr=123) has no matching file, so GitHub returns this page. We
    encode the originally-requested path into the query string and send the
    browser back to the app's entry point. A matching snippet in index.html
    decodes it and calls history.replaceState() so Flutter / GoRouter sees
    the intended URL.

    `segmentCount` below must equal the number of path segments that belong
    to the repo slug (the GitHub Pages base path). For
    https://bitla03gms.github.io/web_build_passenger_app/... that's 1.
    If the app is ever deployed under a different base href, change this.
  -->
  <script>
    var segmentCount = 1;

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  Redirecting&hellip;
</body>
</html>
